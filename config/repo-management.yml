# repo-management manages the fleet — including ITSELF — and is also the fleet's secret
# SOURCE: apply-config.yml injects every `value_from_env` secret from THIS repo's Actions
# secrets into the managed repos, so this repo must itself retain the full union of those
# secrets. That union is now just base.yaml's authoritative set (CI_APP_PRIVATE_KEY,
# GIST_PAT): with ddns migrated to OIDC Trusted Publishing (#68), no PyPI upload token is
# vaulted anywhere, so the source no longer holds anything beyond the fleet-standard creds.
# (test_fleet_config.py's vault test still enforces that this config retains every
# value_from_env secret any config injects, so the source can't be pruned out from under the
# fleet.)
#
# It gets its own config — rather than sitting in gha-public.yml's `repos:` list — so its
# control-plane role is explicit and it has a home for any future per-repo settings. It's
# public (published on PyPI), so it extends gha-public.yml directly, inheriting `private:
# false` and the workflow-based Pages setup.

extends: gha-public.yml

repos:
  - nivintw/repo-management
