# repo-management manages the fleet — including ITSELF — and is also the fleet's secret
# SOURCE: apply-config.yml injects every `value_from_env` secret from THIS repo's Actions
# secrets into the managed repos, so this repo must itself retain the full union of those
# secrets. Left in gha-private.yml (which extends base.yaml), base's authoritative
# `secrets:` (CI_APP_PRIVATE_KEY, GIST_PAT) would prune the package-layer TWINE tokens it
# holds purely as that source — which is exactly what silently happened once.
#
# So it gets its own config extending package.yaml: as a Python package that also vaults the
# publish tokens, it keeps base's two secrets PLUS TWINE_PYPI_UPLOAD_TOKEN +
# TWINE_PYPI_TEST_UPLOAD_TOKEN. Extending the layer (rather than re-listing the secrets here)
# keeps the vault automatically in sync with whatever package.yaml defines.

extends: package.yaml

settings:
  # Public since the package went to PyPI (v1.2.2): the PyPI project links, the README, and
  # the GitHub Pages docs site all point at this repo, and Pages needs a public repo on the
  # free plan. `private: false` is authoritative — an apply enforces it.
  private: false

# `pages: {enabled: true, build_type: workflow}` deliberately isn't declared yet. Flipping
# it here would race two independently-triggered workflows on this same merge: apply-config
# (which applies this file) vs. docs-site.yml (which the same push also triggers, since it
# touches docs/**/mkdocs.yml) — nothing orders "Pages source flipped to Actions" before "the
# first Actions deploy actually succeeds", and a blind PUT to the Pages API doesn't check
# readiness either. If apply-config wins that race and the first docs-site.yml run then
# fails for any transient reason, the live site 404s until someone notices (this path is
# gated on docs/**/mkdocs.yml changes, so an unrelated later push won't retry it). Landing
# this alone, in its own commit/PR once a manual `workflow_dispatch` of docs-site.yml has
# confirmed the build succeeds, removes the race entirely. See #87.

repos:
  - nivintw/repo-management
