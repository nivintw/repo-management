# ddns's applied config. ddns is a public PyPI package repo, so it extends gha-public.yml —
# inheriting `private: false` and the workflow-based Pages setup — and manages ddns directly
# via the `repos:` below. It publishes via OIDC Trusted Publishing (no long-lived upload
# token), so it needs no PyPI publish secrets of its own: the fleet-standard credentials
# (CI_APP_PRIVATE_KEY, GIST_PAT) inherited from base.yaml are all it carries.
#
# ddns already ships a full workflow-based docs pipeline (mkdocs.yml + docs.yml calling this
# repo's reusable docs.yml) but Pages was never turned on for the repo — the GET /pages
# endpoint 404s. Inheriting `pages: {enabled: true, build_type: workflow}` from gha-public.yml
# creates it straight onto build_type: workflow, so there's no legacy-vs-Actions race to fix
# later (unlike nivintw-claude-skills, which had one — #87).
#
# The authoritative secrets/variables provisioned on an apply are CI_APP_PRIVATE_KEY +
# GIST_PAT (secrets, inherited from base.yaml) and CI_CLIENT_ID + CI_APP_SLUG (variables),
# pruning the legacy CI_APP_APPID variable and CI_APP_SECRET / GIST_SECRET secrets the old
# (pre-scaffold) workflow used.
#
# NOTE: with the publish tokens retired (#68), this file no longer adds anything over
# gha-public.yml beyond its own `repos:` — it's kept as ddns's dedicated config (and a home
# for any future ddns-specific settings). It could be renamed to ddns.yml for clarity.

extends: gha-public.yml

repos:
  - nivintw/ddns
