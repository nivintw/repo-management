# Public repos. Extends base.yaml and pins visibility to public. Private repos live in
# gha-private.yml. `private: false` is authoritative — an apply enforces it — but these
# repos are already public, so it's a no-op that just keeps them from drifting private.

extends: base.yaml

settings:
  private: false

repos:
  - nivintw/nivintw-claude-skills
  - nivintw/copier-everything
  - nivintw/dotfiles
  # ddns is public too, but as a PyPI package repo it needs the package.yaml layer (TWINE
  # tokens), which this config doesn't extend — so it lives in its own config (ddns.yml).
