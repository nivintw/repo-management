# Public repos. Extends base.yaml and pins visibility to public. Private repos live in
# gha-private.yml. `private: false` is authoritative — an apply enforces it — but these
# repos are already public, so it's a no-op that just keeps them from drifting private.

extends: base.yaml

settings:
  private: false

# Part of the fleet-wide migration to workflow-based mkdocs Pages sites (batched repo by
# repo). Declaring `workflow` here stops GitHub's classic Pages builder from racing the
# Actions deploy — same fix as repo-management's own #87 — ahead of each repo's docs.yml
# landing.
pages:
  enabled: true
  build_type: workflow

repos:
  - nivintw/nivintw-claude-skills
  - nivintw/copier-everything
  - nivintw/dotfiles
  # ddns is public too, but is managed via its own config (package.yml) — where it inherits
  # this file's public + workflow-Pages settings — rather than being listed here.
