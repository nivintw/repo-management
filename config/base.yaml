# Shared baseline config for nivintw repos. Pulled in via `extends:` from every applied
# config (gha-public.yml, gha-private.yml, and further layers like package.yml built on top
# of them) and merged underneath each. A base file lists no repos of its own. A child can override
# a section — e.g. set `secrets: null` — to opt that repo out of an authoritative section.
#
# EDIT ME. These are safe defaults — tighten/loosen to taste. Reminder on semantics:
#   - A section you DECLARE is authoritative: anything on the repo not listed here is
#     removed. A section you OMIT is left entirely unmanaged.
#   - `~DEFAULT_BRANCH` resolves per-repo (main here, master on cxxserv/cxxtests).

settings:
  # Visibility is NOT set here on purpose — it's a mix across repos. The split configs set
  # it per-group instead: gha-public.yml pins `private: false`, gha-private.yml `private:
  # true`. (The settings field is `private:`, a bool — there is no `visibility:` field.)
  has_issues: true
  has_wiki: true
  has_projects: true
  allow_squash_merge: false
  allow_merge_commit: false
  allow_rebase_merge: true
  delete_branch_on_merge: true
  default_branch: main
  allow_auto_merge: true
  # "Always suggest updating pull request branches" — shows the Update-branch button when a
  # PR is behind its base.
  allow_update_branch: true

actions:
  # Let workflows create and approve pull requests: the scaffold's approve-bot-prs workflow
  # (nivintw/copier-everything#108) approves trusted bot PRs (Renovate / release-please)
  # with its own GITHUB_TOKEN, which requires this Actions setting.
  can_approve_pull_request_reviews: true

rulesets:
  - name: main protection
    target: branch
    enforcement: active
    conditions:
      ref_name: {include: ["~DEFAULT_BRANCH"], exclude: []}
    rules:
      # History/ref guards that apply to everyone — this ruleset has no bypass_actors.
      - {type: required_linear_history}
      - {type: non_fast_forward}
      - {type: deletion}

  - name: Require Pull Requests
    target: branch
    enforcement: active
    conditions:
      ref_name: {include: ["~DEFAULT_BRANCH"], exclude: []}
    rules:
      # Solo-owner baseline: require a PR but allow self-merge (0 approvals). Bump the
      # count and/or add a bypass_actors entry once there are other reviewers.
      - {
        type: pull_request,
        required_approving_review_count: 0,
        dismiss_stale_reviews_on_push: true,
      }
    bypass_actors:
      - actor_id: 5 # Repository Admins
        actor_type: RepositoryRole
        bypass_mode: pull_request
      # The release App signs the commitizen bump commit and pushes it straight to the
      # default branch — not via a PR — so it must bypass the pull_request requirement.
      - actor_id: 998885 # nivintw-ci-app (release GitHub App)
        actor_type: Integration
        bypass_mode: always

  - name: Require ci checks
    target: branch
    enforcement: active
    conditions:
      ref_name: {include: ["~DEFAULT_BRANCH"], exclude: []}
    rules:
      # The required context is the check-run name GitHub reports, which for the scaffold's
      # reusable workflow (caller job `ci` -> reusable job `lint-and-test`) is
      # "ci / lint-and-test", NOT a bare "ci". A repo that doesn't report this context will
      # have its PRs blocked until it does — which is fine here: onboarding a repo includes
      # adding that workflow, and the onboarding PR itself reports the check.
      - {
        type: required_status_checks,
        required_checks: ["ci / lint-and-test"],
        strict_required_status_checks_policy: true,
      }
    bypass_actors:
      # The release App pushes the signed bump commit directly to the default branch, which
      # never ran this check — so it must bypass, or every app-signed release is rejected
      # with "Required status check 'ci / lint-and-test' is expected".
      - actor_id: 998885 # nivintw-ci-app (release GitHub App)
        actor_type: Integration
        bypass_mode: always

  - name: protect release tags
    target: tag
    enforcement: active
    conditions:
      ref_name: {include: ["refs/tags/v*"], exclude: []}
    rules:
      # A v* tag is a publish trust boundary (repo-management#71): the OIDC Trusted
      # Publishing environments restrict deployments to v* tags, so anyone who can create
      # one can trigger a PyPI publish from an arbitrary tree. Block creation/update/
      # deletion for everyone except the release App, which cuts the tag itself.
      - {type: creation}
      - {type: update}
      - {type: deletion}
    bypass_actors:
      # Manual remedy if the release App's installation/key ever breaks or a tag needs a
      # one-off hand fix — without this, a broken App would lock every repo owner out of
      # their own v* tags fleet-wide until this ruleset itself is edited.
      - actor_id: 5 # Repository Admins
        actor_type: RepositoryRole
        bypass_mode: always
      - actor_id: 998885 # nivintw-ci-app (release GitHub App) — cuts the v* release tag
        actor_type: Integration
        bypass_mode: always

variables:
  # Actions variables. Unlike secrets, values are readable, shown in plans, and updated
  # only when they differ. Authoritative: a variable not listed here is deleted — so if a
  # workflow authenticates with a variable (e.g. an App client ID), declare it here or an
  # apply will remove it.
  - {name: CI_CLIENT_ID, value: Iv23lieFW7nh4fTOAbgf}
  # The CI App's slug: the scaffold's approve-bot-prs workflow uses it to recognize PRs
  # authored by the App (Renovate / release-please) before approving them.
  - {name: CI_APP_SLUG, value: nivintw-ci-app}

secrets:
  # Actions secrets. Values are write-only and never printed in plans. The value is read
  # from the CI environment at apply time — the apply-config workflow injects each secret's
  # value into the matching env var (there is no API to read a secret back, so
  # `value_from_env` is how a CI secret reaches the tool). Every `value_from_env` name here
  # MUST be exported — with a non-empty value — in apply-config.yml's apply step; apply fails
  # fast if the env var is unset or empty (Actions expands an unset secret to "").
  - {name: CI_APP_PRIVATE_KEY, value_from_env: CI_APP_PRIVATE_KEY}
  # GIST_PAT: a PAT for updating coverage-badge (and other badge) gists. Fleet-wide — the
  # scaffold's CI writes a coverage badge to a gist, so every managed repo gets it.
  - {name: GIST_PAT, value_from_env: GIST_PAT}

labels:
  # ⚠️ AUTHORITATIVE: declaring `labels` deletes every label NOT listed here, on every
  # managed repo. Comment this whole section out to leave labels unmanaged instead.
  #
  # The dev-kit task-tracking taxonomy — three orthogonal axes. An issue carries one
  # `status:` progression label (with `status:blocked` layered on as an orthogonal flag),
  # one `type:`, and one `priority:`. Keep this in sync with /dev-kit:handle-task-tracking.

  # status — one of the first four at a time; `blocked` is an orthogonal flag on top.
  - {name: "status:triage", color: cccccc, description: Needs triage}
  - {name: "status:ready", color: 0e8a16, description: Ready to start}
  - {name: "status:in-progress", color: fbca04, description: Being worked}
  - {name: "status:in-review", color: 1d76db, description: In review}
  - {name: "status:blocked", color: b60205, description: Blocked}

  # type — one per issue; mirrors the commit type.
  - {name: "type:bug", color: d73a4a, description: Bug fix}
  - {name: "type:feature", color: a2eeef, description: New feature}
  - {name: "type:chore", color: ededed, description: Chore / maintenance}
  - {name: "type:docs", color: 0075ca, description: Documentation}

  # priority — one per issue; drives "what's next" from status:ready.
  - {name: "priority:high", color: b60205, description: High priority}
  - {name: "priority:medium", color: fbca04, description: Medium priority}
  - {name: "priority:low", color: c5def5, description: Low priority}

  # release-please's release-state labels. It creates these on repos where its release
  # workflow runs (the scaffold's main.yml); listed here so this authoritative set doesn't
  # prune them out from under it. Fleet-wide per epic #11 (every repo is moving onto the
  # scaffold). `color` matches what release-please sets; description left unmanaged.
  - {name: "autorelease: pending", color: ededed}
  - {name: "autorelease: tagged", color: ededed}
