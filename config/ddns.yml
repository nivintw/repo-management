# ddns is a public Python package repo. It extends package.yaml (PyPI publish layer) rather
# than base.yaml directly, so it inherits the shared baseline PLUS the TWINE upload tokens.
# It lives in its own config (not gha-public.yml) only because gha-public.yml extends
# base.yaml, while ddns needs the package.yaml layer.
#
# Now that ddns runs the scaffold (main.yml authenticates the CI App the standard way —
# CI_CLIENT_ID variable + CI_APP_PRIVATE_KEY secret), the authoritative secrets/variables
# are managed here: an apply provisions CI_CLIENT_ID + CI_APP_PRIVATE_KEY + GIST_PAT +
# TWINE_PYPI_UPLOAD_TOKEN + TWINE_PYPI_TEST_UPLOAD_TOKEN and prunes the legacy CI_APP_APPID
# variable and CI_APP_SECRET / GIST_SECRET secrets the old (pre-scaffold) workflow used.

extends: package.yaml

settings:
  private: false

repos:
  - nivintw/ddns
