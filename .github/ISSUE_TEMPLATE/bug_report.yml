name: 🐛 Bug report
description: Report a problem with Repo Management
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal, reliable way to reproduce the problem.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Version / environment
    validations:
      required: false
