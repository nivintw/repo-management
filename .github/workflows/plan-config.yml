# Plan pipeline: on PRs that touch the config, run a READ-ONLY plan of every applied config
# and surface the diff in the job summary — so a config change is reviewable BEFORE it
# merges and apply-config.yml runs it for real on main. This is the preview half the
# apply-config.yml header promises ("plan runs read-only in PRs"); apply is the deploy half.
#
# AUTH: mints an installation token from the same CI App as apply. The job only ever READS
# (it runs `plan`, never `apply`), but the token needs `administration: write` — GitHub returns
# the `allow_*` merge settings and ruleset bypass actors ONLY to write-level admin tokens, so a
# read-scoped token reports false drift on every repo's settings/rulesets. The other scopes stay
# read. `plan` resolves a `value_from_env` secret only when it would create (or, with
# --force-secrets, re-push) it — never transmitting the value — so the same secret env vars apply
# exports are still provided. On a fork PR, secrets are absent — the preflight gate checks the
# App key and skips the job cleanly (green, no token mint).

name: plan-config

on:
  pull_request:
    paths:
      - config/**
      - .github/workflows/plan-config.yml

permissions:
  contents: read

# A newer push to the PR supersedes an in-flight preview; reads are safe to cancel.
concurrency:
  group: plan-config-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      plan_enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        # Gate on the App private KEY (a secret), not just CI_CLIENT_ID (a variable, which is
        # readable even on fork PRs): on a fork PR the secret is absent, so this skips cleanly
        # rather than letting the token mint fail. Both must be present to plan.
        env:
          CI_CLIENT_ID: ${{ vars.CI_CLIENT_ID }}
          CI_APP_PRIVATE_KEY: ${{ secrets.CI_APP_PRIVATE_KEY }}
        run: |
          if [ -n "$CI_CLIENT_ID" ] && [ -n "$CI_APP_PRIVATE_KEY" ]; then
            echo "enabled=true" >>"$GITHUB_OUTPUT"
          else
            echo "enabled=false" >>"$GITHUB_OUTPUT"
            echo "::notice::Plan skipped — CI App credentials unavailable (repo unconfigured, or a fork PR without secrets)."
          fi

  plan:
    needs: preflight
    if: needs.preflight.outputs.plan_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      # Checkout + uv first (default read-only token) so we can read the configs and derive
      # the exact repo set BEFORE minting the App token — scoping it to just those repos.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Read-only gate — don't leave the checkout token in .git/config (zizmor artipacked).
          persist-credentials: false

      - name: Set up uv (+ managed Python)
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true

      - name: Mint an installation token (used read-only) scoped to the managed repos
        id: app-token
        # Shared composite action (see .github/actions/mint-app-token), the same one apply uses.
        # The job only READS (runs `plan`), so mode: read — note `mode` governs only
        # issues/secrets/actions_variables; the action always requests `administration: write`
        # even here (see its `mode` input doc for why a read-only plan still needs it).
        uses: ./.github/actions/mint-app-token
        with:
          client-id: ${{ vars.CI_CLIENT_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          mode: read

      - name: Plan every config (read-only) and write the diff to the job summary
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          # plan resolves a value_from_env secret only when it would WRITE it — a secret being
          # created (absent on the target) or re-pushed with --force-secrets; secrets already
          # present are skipped and never resolved. plan never transmits a value (only apply
          # writes it). We still export every value_from_env secret the configs reference, since
          # any of them may need creating on some repo — a missing one fails fast only when a
          # write actually needs it. This block must match apply-config.yml's and the configs'
          # value_from_env set — enforced by tests/test_workflow_secrets.py (#39).
          CI_APP_PRIVATE_KEY: ${{ secrets.CI_APP_PRIVATE_KEY }}
          GIST_PAT: ${{ secrets.GIST_PAT }}
          TWINE_PYPI_UPLOAD_TOKEN: ${{ secrets.TWINE_PYPI_UPLOAD_TOKEN }}
          TWINE_PYPI_TEST_UPLOAD_TOKEN: ${{ secrets.TWINE_PYPI_TEST_UPLOAD_TOKEN }}
          # Render rich output as plain, wide text for the summary (no TTY in CI).
          NO_COLOR: "1"
          COLUMNS: "200"
        run: |
          # pipefail so a plan failure propagates through the `| tee` below (tee always exits 0).
          set -o pipefail
          status=0
          {
            echo "## Config plan — read-only preview"
            echo ""
            echo "_What an apply on \`main\` would change on the live repos. No writes happen here._"
          } >>"$GITHUB_STEP_SUMMARY"
          # base.yaml / package.yaml are layers (.yaml), pulled in via extends — the glob skips
          # them; every applied config is a config/*.yml file.
          for cfg in config/*.yml; do
            echo "::group::plan $cfg"
            {
              echo ""
              echo "### \`$cfg\`"
              echo ""
              echo '```'
            } >>"$GITHUB_STEP_SUMMARY"
            # tee, not a bare redirect: the diff lands in the rendered job summary AND in the
            # collapsible step log (under ::group::) for debugging, instead of an empty group.
            if ! uv run repo-management plan -c "$cfg" 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"; then
              status=1
            fi
            echo '```' >>"$GITHUB_STEP_SUMMARY"
            echo "::endgroup::"
          done
          exit $status

      - name: Revoke the installation token
        # The token isn't auto-revoked (we mint it ourselves, not via create-github-app-token,
        # and a composite action can't register a post-job step), so revoke it at job end via
        # the shared action rather than leaving it valid for its full hour.
        if: always() && steps.app-token.outputs.token
        uses: ./.github/actions/revoke-app-token
        with:
          token: ${{ steps.app-token.outputs.token }}
