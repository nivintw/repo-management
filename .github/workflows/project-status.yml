# Roadmap Part 1 (repo-management #135): post a weekly status update to the Fleet Roadmap
# board — a deterministic health label + shipped/blocked/up-next narrative, computed from the
# board itself (no hand-clicked UI config). `projects status` dedupes within a 6-day window
# and fails loud on auth, so a double-fired cron or an expired token never posts garbage.
#
# AUTH: a user-level Projects v2 board can't be written by the default GITHUB_TOKEN. Provide a
# fine-grained PAT with `Projects: Read and write` as the `ROADMAP_PROJECT_TOKEN` secret. A PAT
# is broader and less-rotatable than the CI App, but org Apps don't cleanly reach user-owned
# Projects v2 — so a scoped PAT is the pragmatic choice here (revisit if the board moves to an
# org). SAFE UNTIL CONFIGURED: the preflight skips the run cleanly (green, no post) until the
# secret exists.

name: roadmap-status

on:
  schedule:
    - cron: "0 14 * * 1" # Mondays 14:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Compute and print the update without posting"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: roadmap-status
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.ROADMAP_PROJECT_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "enabled=true" >>"$GITHUB_OUTPUT"
          else
            echo "enabled=false" >>"$GITHUB_OUTPUT"
            echo "::notice::Roadmap status skipped — ROADMAP_PROJECT_TOKEN not set. Add a fine-grained PAT (Projects: read+write) to enable it."
          fi

  status:
    needs: preflight
    if: needs.preflight.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv (+ managed Python)
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true

      - name: Post the weekly status update
        env:
          GITHUB_TOKEN: ${{ secrets.ROADMAP_PROJECT_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: |
          args=(-c config/projects.yaml)
          [ -n "$DRY_RUN" ] && args+=(--dry-run)
          uv run repo-management projects status "${args[@]}"
