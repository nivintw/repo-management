# Thin caller: the actual MkDocs build-and-deploy logic lives in ONE place —
# nivintw/repo-management's reusable workflow — so a `mkdocs`/`mkdocs-material` version
# bump is one Renovate PR for the whole fleet, not one per repo. `pages: write` +
# `id-token: write` are declared here (not inside the reusable workflow) because GitHub
# requires the CALLING workflow to grant the permissions a reusable workflow's jobs use.
#
# Pinned to a commit (zizmor's blanket unpinned-uses policy), not a tag — repo-management
# has no release process for this workflow, so Renovate tracks and bumps the digest instead,
# same as it does for every other `uses:` pin in this file (see main.yml/docs on Renovate's
# GitHub Actions digest-pinning).
#
# Named (and filed) distinctly from `docs.yml` — this repo is the unusual case where that
# filename is already taken by the *reusable* workflow every other fleet repo calls, so this
# caller (normally also named/filed `docs.yml` per the template) lives here instead.
name: docs-site

on:
  push:
    branches: [main]
    # overrides/ is the theme customization dir (e.g. overrides/404.html) — also part of
    # what mkdocs build reads, so a change there needs a redeploy same as docs/ or
    # mkdocs.yml itself (caught by Copilot review; the copier-everything template's own
    # caller has the same gap, filed upstream too). This file's own `uses:` pin is
    # included too — bumping the pinned commit (by hand or via Renovate) changes which
    # reusable-workflow code actually runs, so it needs the same redeploy as any other
    # docs input (nivintw/repo-management#116 shipped a docs.yml change whose pin bump in
    # this file landed in a separate, non-triggering commit, so the new plugins silently
    # never ran until this path was added and a manual workflow_dispatch caught up).
    paths: ['docs/**', 'mkdocs.yml', 'overrides/**', '.github/workflows/docs-site.yml']
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    # WARNING — do NOT bump this pin past the last MkDocs revision of docs.yml until THIS repo's
    # own docs site is migrated to Astro/Starlight. docs.yml was migrated MkDocs → Astro in #158;
    # the Astro workflow runs `pnpm install --frozen-lockfile && pnpm build` and needs a
    # package.json + pnpm-lock.yaml + astro.config.mjs that this repo does not yet have (its site
    # is still docs/*.md + mkdocs.yml). Bumping to the Astro docs.yml before that migration would
    # break this repo's docs deploy. The SHA below is the last MkDocs revision on purpose; the
    # migration of this repo's own site (issue #161) is what unpins it.
    uses: nivintw/repo-management/.github/workflows/docs.yml@53814792ac9f28bf400470f82a506d4ee34e138b # main
