# Publish releases to PyPI, dress-rehearsed through TestPyPI first. release-please
# (main.yml) cuts the `vX.Y.Z` tag + GitHub Release; this fires on that Release (event
# `release: published`) and drives: build once → publish to TestPyPI → smoke-install from
# TestPyPI → publish to PyPI. The artifacts are built exactly once and passed between jobs,
# so what lands on PyPI is byte-for-byte what the smoke test exercised. PyPI uploads are
# immutable — a broken artifact burns the version number — which is what the rehearsal
# stage is for.
#
# LOAD-BEARING: this only fires because release-please in main.yml creates the Release using
# a GitHub App token, NOT the default GITHUB_TOKEN. Releases created with GITHUB_TOKEN do not
# trigger downstream workflows, so switching release-please back to GITHUB_TOKEN would
# silently stop PyPI publishing. Triggering on `release: published` (no `ref:` on checkout)
# means the build resolves to the release's tag, so `uv build` builds exactly the released
# version.
#
# AUTH — OIDC Trusted Publishing (no long-lived secret), bound to deployment environments.
# Each publish job runs in its own environment (`testpypi` / `pypi`); both environments
# restrict deployments to `v*` tags, so only a run on a real release tag can mint an upload
# token — a modified copy of this workflow on a branch gets nothing. One-time setup per
# index (done for this repo): a Trusted Publisher on test.pypi.org / pypi.org pointing at
# owner `nivintw`, repo `repo-management`, workflow `publish.yml`, environment `testpypi` /
# `pypi` respectively. `--trusted-publishing always` makes a missing or misconfigured
# publisher fail loudly (never a silent no-op), and `--check-url` makes re-runs idempotent
# (files already on the index are skipped instead of erroring).
#
# The smoke job deliberately has NO `id-token: write` and no checkout: it resolves packages
# from TestPyPI, an index anyone can upload to, and code running during that install (a
# dependency's sdist build hook, say) must not share a job that can mint upload tokens.
#
# This flow is proven here first and back-ported to the copier-everything template
# (nivintw/copier-everything#109); ddns's token-based publish is migrated after that (#68).

name: publish

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  # The distribution name on (Test)PyPI — the single substitution point for the
  # template back-port. The smoke job's console-script invocation is a separate
  # identity (pyproject [project.scripts]) and stays literal.
  DIST_NAME: repo-management

jobs:
  build:
    # Skip on forks only. A fork's release shouldn't try (and fail) to publish — it has no
    # Trusted Publisher configured — and this keeps forks green; the guard lives here alone
    # because every other job `needs` this one and skips with it. We gate on the event
    # payload's `fork` flag rather than a baked-in `owner/repo` literal on purpose: a
    # literal silently stops matching if the canonical repo is renamed or transferred (or
    # its answer was typo'd), turning every release into a green no-op that never publishes.
    # `fork == false` survives a rename, so the canonical repo keeps publishing; a real
    # misconfig instead fails loudly at `uv publish` (no Trusted Publisher → non-zero exit),
    # never a silent skip. (Written as a bare expression: a job `if:` is already evaluated
    # as one, and GitHub's dollar-brace expression wrapper would collide with Jinja's
    # delimiters at render time.)
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.build.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv (+ managed Python)
        # No dependency cache anywhere in this workflow: it builds and ships the release
        # artifact, so a poisoned cache would taint the release (zizmor cache-poisoning).
        # The minor speedup isn't worth that on a release path. setup-uv caches by default,
        # so disable explicitly.
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: false

      - name: Build and check the distributions
        # The version output comes from the project itself (not re-derived from the
        # tag), so downstream jobs test exactly what was built even if the tag
        # scheme changes.
        id: build
        run: |
          uv build
          uvx twine check --strict dist/*
          echo "version=$(uv version --short)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/${{ env.DIST_NAME }}/
    permissions:
      id-token: write # OIDC token for TestPyPI Trusted Publishing; no checkout, so no contents
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: false

      - name: Publish to TestPyPI (Trusted Publishing)
        run: >-
          uv publish
          --trusted-publishing always
          --publish-url https://test.pypi.org/legacy/
          --check-url https://test.pypi.org/simple/

  smoke:
    # Prove the TestPyPI upload actually installs and runs before touching PyPI. The exact
    # released version can only resolve from TestPyPI here (PyPI doesn't have it yet);
    # dependencies fall through to real PyPI, which TestPyPI does not mirror.
    needs: [build, testpypi]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: false

      - name: Install the released version from TestPyPI and exercise the CLI
        # The index can lag a fresh upload by a few seconds: poll until the exact
        # version is visible, then run the install-and-exercise step once — so a
        # genuinely broken artifact fails immediately and unambiguously instead of
        # being retried into "not installable yet" noise.
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          for attempt in 1 2 3 4 5; do
            if curl -fsS --output /dev/null "https://test.pypi.org/pypi/${DIST_NAME}/${VERSION}/json"; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::${DIST_NAME}==${VERSION} never appeared on TestPyPI"
              exit 1
            fi
            echo "attempt ${attempt}: ${DIST_NAME}==${VERSION} not on TestPyPI yet; retrying in 15s"
            sleep 15
          done
          uv run --isolated --no-project \
            --index https://test.pypi.org/simple/ \
            --with "${DIST_NAME}==${VERSION}" \
            -- repo-management --help

  pypi:
    needs: smoke
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ env.DIST_NAME }}/
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing; no checkout, so no contents
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: false

      - name: Publish to PyPI (Trusted Publishing)
        run: >-
          uv publish
          --trusted-publishing always
          --check-url https://pypi.org/simple/
