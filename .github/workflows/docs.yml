# Reusable (on: workflow_call) build-and-deploy for Astro + Starlight docs sites. Every fleet
# repo's own docs workflow becomes a thin caller — this hosts the build/deploy logic once so
# it isn't duplicated across repos.
#
# WHAT IS PINNED WHERE (the "single fleet source" split):
#   - Node + pnpm are pinned HERE (NODE_VERSION / PNPM_VERSION below), Renovate-tracked, so the
#     whole fleet moves the toolchain in one PR — the same one-place-pin the MkDocs version of
#     this workflow gave for mkdocs/mkdocs-material.
#   - astro + @astrojs/starlight (and any per-site deps) are pinned in EACH caller repo's
#     committed package.json + pnpm-lock.yaml, installed verbatim by `pnpm install
#     --frozen-lockfile`. That's a deliberate consequence of using a committed lockfile: the
#     framework version travels with the site's own dependency graph, authored identically
#     across the fleet by the generate-docs skill.
#
# CALLER CONTRACT:
#   - The caller repo checkout must contain, under `docs-dir`, a package.json (with a `build`
#     script that runs `astro build`) and a committed pnpm-lock.yaml.
#   - The caller's package.json must NOT set a `packageManager` field: pnpm is pinned here via
#     PNPM_VERSION, and pnpm/action-setup errors loudly ("Multiple versions of pnpm specified")
#     if both are present. One pnpm source, and it's this file.
#
# CALLERS MUST grant `permissions: {contents: read, pages: write, id-token: write}` on the
# job that has `uses:` this workflow. Declaring ANY `permissions:` block on that job forces
# every scope it omits to `none` for the token this workflow receives — this workflow's own
# `contents: read` below cannot restore it. Omit `contents: read` and checkout fails on any
# private fleet repo; omit `pages`/`id-token` and Configure Pages or the deploy step fails.
# None of these fail silently, but the error doesn't point back at the missing grant.
#
# PERMANENT TEMPLATE DIVERGENCE — `copier update` WILL conflict on this file's `on:` block
# every time copier-everything's own docs.yml changes, because that upstream file is a
# per-repo `push`-triggered caller stub, while this file is the hub's `workflow_call`
# reusable workflow — a structurally different trigger this repo intentionally never
# adopts. Resolved the same way at every past update: keep the `workflow_call` trigger above
# as-is and discard the incoming `push`/`paths` block entirely (a caller-side fix, e.g. an
# `overrides/**` path, belongs in docs-site.yml instead — check it's already there).

name: docs

on:
  workflow_call:
    inputs:
      docs-dir:
        description: >-
          Directory containing the Astro/Starlight project (its package.json,
          pnpm-lock.yaml, and astro.config.mjs), relative to the repo root.
        type: string
        default: "."

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # renovate: datasource=node-version depName=node
      # Full semver so Renovate is the ONLY thing that moves it — a bare "22" would silently
      # float to the latest 22.x on every run, defeating the "one Renovate PR moves the fleet"
      # pin. Node 22 is the conservative Active-LTS floor Astro supports; Renovate advances it.
      NODE_VERSION: "22.12.0"
      # renovate: datasource=npm depName=pnpm
      PNPM_VERSION: "11.7.0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          # Full history: Starlight's `lastUpdated` derives each page's "last updated" date
          # from git log — a shallow clone yields wrong/identical dates. Mirrors the MkDocs
          # workflow's fetch-depth:0 for the git-revision-date plugin it replaces.
          fetch-depth: 0

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        # No dependency cache: this job builds the artifact that gets deployed to Pages, so a
        # poisoned cache would taint the deploy (zizmor cache-poisoning) — same reasoning as
        # this repo's publish.yml and the MkDocs workflow this replaces. setup-node only caches
        # when `cache:` is set, so simply omitting it leaves caching off.
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies (frozen lockfile)
        working-directory: ${{ inputs.docs-dir }}
        run: pnpm install --frozen-lockfile

      - name: Build site (pnpm build → astro build → dist/)
        working-directory: ${{ inputs.docs-dir }}
        # `astro build` hard-fails on broken internal links, replacing `mkdocs build --strict`.
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ${{ inputs.docs-dir }}/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
