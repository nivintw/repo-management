# Reusable (on: workflow_call) build-and-deploy for MkDocs Material docs sites. Every fleet
# repo's own docs workflow becomes a thin caller — this hosts the build/deploy logic once so
# it isn't duplicated across repos.
#
# mkdocs + mkdocs-material are pinned HERE, not passed in as caller inputs — that keeps
# non-Python fleet repos (dotfiles, the Ansible repos) from needing a fake Python dependency
# just to build docs. One Renovate-tracked pin here covers the whole fleet.
#
# CALLERS MUST grant `permissions: {contents: read, pages: write, id-token: write}` on the
# job that has `uses:` this workflow. Declaring ANY `permissions:` block on that job forces
# every scope it omits to `none` for the token this workflow receives — this workflow's own
# `contents: read` below cannot restore it. Omit `contents: read` and checkout fails on any
# private fleet repo; omit `pages`/`id-token` and Configure Pages or the deploy step fails.
# None of these fail silently, but the error doesn't point back at the missing grant.

name: docs

on:
  workflow_call:
    inputs:
      docs-dir:
        description: Directory containing mkdocs.yml, relative to the repo root.
        type: string
        default: "."
      extra-packages:
        description: >-
          Extra PyPI packages the caller's mkdocs.yml needs beyond mkdocs-material (e.g.
          mkdocs-awesome-pages-plugin), space-separated. Each is added as its own `--with`
          to the pinned uvx invocation below.
        type: string
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          # Full history: mkdocs-git-revision-date-localized-plugin derives each page's
          # "last updated" date from git log — a shallow clone yields wrong/identical
          # dates on every page.
          fetch-depth: 0

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Set up uv
        # No dependency cache: this job builds the artifact that gets deployed to Pages, so
        # a poisoned cache would taint the deploy (zizmor cache-poisoning) — same reasoning
        # as this repo's publish.yml. setup-uv caches by default, so disable explicitly.
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: false

      - name: Install native deps for Material's social-cards plugin
        # cairosvg (which the plugin uses to rasterize the generated card) loads these via
        # ctypes at runtime, not import time, so a build only fails once the plugin actually
        # renders a card. Installed unconditionally, same as mkdocs/mkdocs-material below and
        # for the same reason (see the top-of-file rationale): every fleet repo's mkdocs.yml
        # renders from one shared copier-everything template, so this and the dates plugin's
        # fetch-depth above are fleet-wide defaults, not a per-caller opt-in like
        # extra-packages — there's no real caller variation to gate behind an input.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev zlib1g-dev

      - name: Build site (uvx, pinned mkdocs + mkdocs-material)
        working-directory: ${{ inputs.docs-dir }}
        env:
          # renovate: datasource=pypi depName=mkdocs
          MKDOCS_VERSION: "1.6.1"
          # renovate: datasource=pypi depName=mkdocs-material
          MKDOCS_MATERIAL_VERSION: "9.7.6"
          # renovate: datasource=pypi depName=mkdocs-git-revision-date-localized-plugin
          GIT_REVISION_DATE_VERSION: "1.5.3"
          # renovate: datasource=pypi depName=mkdocs-llmstxt
          LLMSTXT_VERSION: "0.5.0"
          EXTRA_PACKAGES: ${{ inputs.extra-packages }}
        run: |
          extra_with=()
          for pkg in $EXTRA_PACKAGES; do
            extra_with+=(--with "$pkg")
          done
          # [imaging] extra pulls in cairosvg + Pillow, the Python side of the social-cards
          # plugin — the apt step above only installs the native libs they dlopen via ctypes.
          # mkdocs-git-revision-date-localized-plugin and mkdocs-llmstxt are also fleet-wide
          # defaults (nivintw/repo-management#94, #97) — every fleet repo's mkdocs.yml enables
          # both plugins unconditionally, same reasoning as imaging above — pinned and
          # Renovate-tracked the same way, so neither can float to an unreviewed version.
          uvx --from "mkdocs==${MKDOCS_VERSION}" --with "mkdocs-material[imaging]==${MKDOCS_MATERIAL_VERSION}" \
            --with "mkdocs-git-revision-date-localized-plugin==${GIT_REVISION_DATE_VERSION}" \
            --with "mkdocs-llmstxt==${LLMSTXT_VERSION}" \
            "${extra_with[@]}" mkdocs build --strict --site-dir site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ${{ inputs.docs-dir }}/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
