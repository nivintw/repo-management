# Apply pipeline: on every push to main that touches the config, reconcile the live repos
# to match every applied config (config/*.yml — gha-public, gha-private, and the per-repo
# special configs like ddns/dotfiles; base.yaml is the shared base they extend) via the
# GitHub API. This is the deploy half of the tool — `plan` runs read-only in PRs; `apply`
# runs here, on main only.
#
# AUTH: this administers OTHER repos, which the default GITHUB_TOKEN cannot do. It mints
# an installation token from the same CI GitHub App used by the release job (the App's
# client ID lives in the `CI_CLIENT_ID` repository *variable* — it isn't sensitive — and
# the key in the `CI_APP_PRIVATE_KEY` secret) and feeds it to the CLI as $GITHUB_TOKEN.
#
#   For this to actually apply, the CI App must be:
#     - installed on every repo listed across the config/*.yml files, and
#     - granted the permissions the managed sections need: Administration: read+write
#       (settings, rulesets, collaborators, webhooks), Issues: read+write (labels),
#       Secrets: read+write (the `secrets:` section), and Variables: read+write (the
#       `variables:` section). The token step requests exactly these and scopes the token to
#       the managed repos, so it's least-privilege on both axes (see that step for why we
#       mint it directly instead of via actions/create-github-app-token).
#   The token below is scoped to the whole owner (no `repositories:` input) so one run can
#   reach all installed repos, and down-scoped to just those permissions (zizmor github-app).
#
# SAFE UNTIL CONFIGURED: a preflight step reports whether CI_CLIENT_ID is present and the
# apply job gates on it. Until the App's variable + key exist, apply SKIPS cleanly (green
# run, no writes) — so merging to main is always safe.

name: apply-config

on:
  push:
    branches: [main]
    paths:
      - config/**
      - .github/workflows/apply-config.yml
  # Manual re-apply (e.g. to reconcile drift, or after changing App installation/perms).
  workflow_dispatch:

permissions:
  contents: read

# Serialize applies so overlapping merges can't race writes to the same repos.
concurrency:
  group: apply-config-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      apply_enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          CI_CLIENT_ID: ${{ vars.CI_CLIENT_ID }}
        run: |
          if [ -n "$CI_CLIENT_ID" ]; then
            echo "enabled=true" >>"$GITHUB_OUTPUT"
          else
            echo "enabled=false" >>"$GITHUB_OUTPUT"
            echo "::notice::Apply skipped — CI_CLIENT_ID not set. Set the CI_CLIENT_ID repository variable (+ CI_APP_PRIVATE_KEY secret) to enable applying config."
          fi

  apply:
    needs: preflight
    if: needs.preflight.outputs.apply_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      # Checkout + uv first (using the default read-only token) so we can read the configs
      # and derive the exact repo set BEFORE minting the App token — that lets us scope the
      # token to just those repos instead of the whole owner (zizmor github-app).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Read-only checkout — the API writes use the App token, not git (zizmor artipacked).
          persist-credentials: false

      - name: Set up uv (+ managed Python)
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true

      - name: Mint an installation token scoped to the managed repos + permissions
        id: app-token
        # `actions/create-github-app-token` can't request the `Variables` permission (it has
        # no `permission-variables` input — and inheriting all perms instead trips zizmor's
        # blanket-permissions audit). So mint the token directly: PyGithub builds the App JWT
        # and finds the installation; the REST endpoint then issues a token scoped to BOTH
        # the exact repo set (derived from the configs — single source of truth) AND the
        # explicit permissions, Variables included. Inputs arrive via env, never `${{ }}` in
        # the script (zizmor template-injection).
        env:
          CI_CLIENT_ID: ${{ vars.CI_CLIENT_ID }}
          CI_APP_PRIVATE_KEY: ${{ secrets.CI_APP_PRIVATE_KEY }}
          OWNER: ${{ github.repository_owner }}
          THIS_REPO: ${{ github.event.repository.name }}
        run: |
          uv run python - <<'PY'
          import glob, json, os, urllib.request
          from pathlib import Path

          from github import Auth, GithubIntegration

          from repo_management.config import load_config

          repos = sorted({
              repo.split("/", 1)[1]
              for path in glob.glob("config/*.yml")
              for repo in load_config(Path(path)).repos
          })
          app_auth = Auth.AppAuth(os.environ["CI_CLIENT_ID"], os.environ["CI_APP_PRIVATE_KEY"])
          installation = GithubIntegration(auth=app_auth).get_repo_installation(
              os.environ["OWNER"], os.environ["THIS_REPO"],
          )
          request = urllib.request.Request(
              f"https://api.github.com/app/installations/{installation.id}/access_tokens",
              data=json.dumps({
                  "repositories": repos,
                  "permissions": {
                      "administration": "write",  # settings, rulesets, collaborators, webhooks
                      "issues": "write",           # labels
                      "secrets": "write",          # secrets section
                      "variables": "write",        # variables section
                  },
              }).encode(),
              method="POST",
              headers={
                  "Authorization": f"Bearer {app_auth.create_jwt()}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request) as response:  # noqa: S310 — fixed api.github.com URL
              token = json.load(response)["token"]
          print(f"::add-mask::{token}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"token={token}\n")
          print(f"::notice::Token scoped to {len(repos)} repos "
                "(administration/issues/secrets/variables: write)")
          PY

      - name: Apply the configs
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          # base.yaml's `secrets:` section sources CI_APP_PRIVATE_KEY via value_from_env, so
          # the CLI needs it in the environment to propagate it to the managed repos.
          CI_APP_PRIVATE_KEY: ${{ secrets.CI_APP_PRIVATE_KEY }}
        run: |
          # Every applied config is a config/*.yml file; base.yaml (note the .yaml
          # extension) is the shared base they extend, so the glob skips it.
          for cfg in config/*.yml; do
            echo "::group::apply $cfg"
            uv run repo-management apply -c "$cfg" --yes
            echo "::endgroup::"
          done

      - name: Revoke the installation token
        # The token isn't auto-revoked (we minted it ourselves, not via the action), so
        # revoke it at job end rather than leaving it valid for its full hour.
        if: always() && steps.app-token.outputs.token
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          curl -sS -X DELETE \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/installation/token || true
