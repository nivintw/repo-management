# Example configuration for repo-management.
#
# `repos:` lists the repositories to manage; every section below is the *shared* config
# applied to each of them. `extends:` pulls in one or more base files (relative paths,
# resolved recursively) and merges this file on top: scalars here win, and list sections
# merge by each item's natural key (a same-key item here replaces the base's, new items are
# appended). Each declared section is authoritative — items not listed are removed from the
# repo — while an unset section is left entirely unmanaged.
#
#   repo-management validate -c examples/repos.yaml
#   repo-management plan     -c examples/repos.yaml
#   repo-management apply    -c examples/repos.yaml   # writes; prompts first

extends: base.yaml

repos:
  - nivintw/repo-management
  - nivintw/other-repo

settings:
  # Merged onto base.settings (which sets features + merge options).
  description: Managed by repo-management

rulesets:
  # Same name as the base ruleset -> replaces it wholesale. This one tightens reviews,
  # adds a required check, and lets a specific repository role bypass via PRs.
  - name: main protection
    target: branch
    enforcement: active
    bypass_actors:
      - {actor_type: RepositoryRole, actor_id: 5, bypass_mode: pull_request}
    conditions:
      ref_name: {include: ["~DEFAULT_BRANCH"], exclude: []}
    rules:
      - {type: pull_request, required_approving_review_count: 2, require_code_owner_review: true}
      - {type: required_status_checks, required_checks: [ci, lint]}
      - {type: required_linear_history}
      - {type: non_fast_forward}
  # A new ruleset (appended to the base's list) protecting release tags.
  - name: protect release tags
    target: tag
    enforcement: active
    conditions:
      ref_name: {include: ["refs/tags/v*"], exclude: []}
    rules:
      - {type: deletion}
      - {type: non_fast_forward}
      - {type: tag_name_pattern, operator: starts_with, pattern: "v"}

collaborators:
  # Authoritative: any *direct* collaborator not listed here is removed.
  - {username: octocat, permission: push}

secrets:
  # Actions secrets. Values are write-only and never printed in plans.
  - {name: PYPI_TOKEN, value_from_env: PYPI_TOKEN}
