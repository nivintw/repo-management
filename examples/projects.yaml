# Example config for `repo-management projects` — a GitHub Projects v2 board's field SCHEMA.
#
# A board is a single owner-level entity, so this file has no `repos:` and no `extends:` — it
# is loaded on its own by the `projects` commands:
#
#   repo-management projects validate -c projects.yaml   # schema check, no network
#   repo-management projects plan     -c projects.yaml   # show field/option diff (read-only)
#   repo-management projects apply    -c projects.yaml   # reconcile (prompts before writing)
#
# The token needs Projects access. A USER-owned board requires a CLASSIC PAT with the `project`
# scope (`read:project` for read-only); fine-grained PATs only expose a Projects permission for
# ORG-owned boards, so use a fine-grained PAT with `Projects: Read and write` ONLY if this board
# is org-owned. Only the board's
# custom fields and their single-select options are managed — NOT which issues are on the
# board or their field values (those churn as issues open/close; leave them to automation).
# A field you don't list here is left untouched; within a single-select you DO list, the
# `options` are authoritative (an option not listed is removed, dropping it from every item
# that had it — a plan shows that before you apply).

owner: your-login
owner_type: user # or `organization`

# Address the board by EXACTLY ONE of `number` or `title` — the choice picks the semantics.
#
#   number: 1        # ADOPT the board at …/projects/<number>. GitHub assigns the number when a
#                    # board is created, so a number always names a board that already exists;
#                    # one that doesn't resolve is an error, never a prompt to create it.
#
#   title: My Board  # CONVERGE on the board with this exact title: adopt it if it exists,
#                    # CREATE it if it doesn't. This is the only way to declare a board that
#                    # does not exist yet — its number can't be known in advance. Two boards
#                    # sharing the title is an error (address the intended one by `number`).
#
# `title` is an ADDRESS, not a managed attribute: renaming the board in GitHub's UI reads as
# "the declared board is gone", and the next apply creates a new one. Pin with `number` if that
# matters. Creating a board also reconciles the `fields` below in the same step — including the
# `Status` field GitHub seeds every new board with.
title: My Board

fields:
  # A single-select field. `options` are ordered (that's their display order) and matched
  # against the live board by `name`, so a same-named option keeps its id and the items on it.
  - name: Status
    data_type: single_select
    options:
      - name: Todo
        color: GRAY
        description: Not started
      - name: In Progress
        color: YELLOW
        description: Being worked on
      - name: Done
        color: GREEN
        description: Completed

  # A date field carries no options — the manager only ensures it exists.
  - name: Target
    data_type: date
