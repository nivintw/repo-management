# hawkeye (https://github.com/korandoru/hawkeye) — inserts & maintains SPDX license
# headers for REUSE compliance. Run: `hawkeye format` (or `check`). Header text is
# templated from [properties] so year/holder/license live in one place. Only files
# with no usable comment syntax stay in REUSE.toml (strict JSON, lockfiles).

# REUSE-IgnoreStart — this template literally contains an SPDX-License-Identifier line;
# without the guard, `reuse lint` tries to parse the placeholder as a license.
inlineHeader = """
SPDX-FileCopyrightText: © {{ props["inceptionYear"] }} {{ props["copyrightHolder"] }}
SPDX-License-Identifier: {{ props["spdxLicenseIdentifier"] }}
"""
# REUSE-IgnoreEnd

# Negations cancel hawkeye's built-in default excludes (which skip **/*.md) so those get
# headered too.
excludes = [
  "LICENSE",
  "LICENSES/**",
  "uv.lock",
  "**/*.json",
  "!**/*.md",
  "**/.python-version",
  "**/.vscode/*",
  # CODEOWNERS has no extension hawkeye maps; it carries its own `#` header (reuse-verified).
  "**/CODEOWNERS",
  # GitHub's issue-form parser silently rejects a form whose YAML begins with a comment (it
  # falls back to a blank issue), so ISSUE_TEMPLATE/*.yml must start with the form keys and
  # can't carry an inline SPDX header — excluded here and licensed via REUSE.toml instead.
  ".github/ISSUE_TEMPLATE/**",
  # The Claude Code guard hooks ship verbatim from the template (no per-file templating), so
  # they carry no inline header — excluded here and licensed via REUSE.toml instead.
  ".claude/hooks/**",
]

additionalHeaders = ["markdown-header.toml"]

[mapping.MARKDOWN_CUSTOM]
extensions = ["md"]

# '#'-comment files hawkeye doesn't map by default. (.gitignore stays in hawkeye's default
# excludes and is licensed via REUSE.toml instead — see that file.)
[mapping.SCRIPT_STYLE]
extensions = ["txt", "fish", "bats"]
filenames = [".envrc"]

[properties]
inceptionYear = "2026"
spdxLicenseIdentifier = "MIT"
copyrightHolder = "Tyler Nivin"
